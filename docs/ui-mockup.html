<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Deadline Panel Mockup</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #101318;
        --panel: rgba(25, 29, 36, 0.92);
        --panel-strong: rgba(31, 36, 45, 0.96);
        --line: rgba(255, 255, 255, 0.1);
        --text: #eef2f7;
        --muted: #98a2b3;
        --accent: #7fb4ff;
        --warning: #f5b85c;
        font-family: "Segoe UI", system-ui, sans-serif;
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          radial-gradient(circle at 25% 18%, rgba(127, 180, 255, 0.18), transparent 30%),
          linear-gradient(135deg, #101318, #181c23 58%, #101318);
        color: var(--text);
      }

      .desktop {
        position: relative;
        min-height: 100vh;
        overflow: hidden;
      }

      .strip {
        position: absolute;
        right: 18px;
        bottom: 18px;
        width: 344px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        padding: 10px 12px;
        box-shadow: 0 18px 60px rgba(0, 0, 0, 0.28);
        color: var(--muted);
        font-size: 13px;
      }

      .panel {
        position: absolute;
        right: 18px;
        bottom: 64px;
        width: 344px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-strong);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.36);
        overflow: hidden;
      }

      .section {
        padding: 16px;
        border-bottom: 1px solid var(--line);
      }

      .section:last-child {
        border-bottom: 0;
      }

      .label {
        margin: 0 0 6px;
        color: var(--muted);
        font-size: 12px;
      }

      .focus {
        margin: 0;
        font-size: 20px;
        font-weight: 650;
      }

      .meta {
        margin-top: 8px;
        color: var(--accent);
        font-size: 13px;
      }

      .task {
        display: grid;
        grid-template-columns: auto 1fr auto;
        gap: 10px;
        align-items: start;
        padding: 10px 0;
      }

      .task + .task {
        border-top: 1px solid var(--line);
      }

      .index {
        color: var(--muted);
      }

      .title {
        font-weight: 600;
      }

      .due {
        margin-top: 4px;
        color: var(--muted);
        font-size: 12px;
      }

      .left {
        color: var(--warning);
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <main class="desktop">
      <aside class="panel" aria-label="展开的 Deadline 面板">
        <section class="section">
          <p class="label">现在该做</p>
          <p class="focus">Graph Mining Quiz</p>
          <div class="meta">剩余 2天 | high</div>
        </section>
        <section class="section">
          <p class="label">最近 Deadline</p>
          <div class="task">
            <span class="index">1</span>
            <div>
              <div class="title">Graph Mining Quiz</div>
              <div class="due">2026-06-23 23:59</div>
            </div>
            <span class="left">2天</span>
          </div>
          <div class="task">
            <span class="index">2</span>
            <div>
              <div class="title">研究室报告</div>
              <div class="due">2026-06-25 18:00</div>
            </div>
            <span class="left">4天</span>
          </div>
          <div class="task">
            <span class="index">3</span>
            <div>
              <div class="title">文献阅读</div>
              <div class="due">2026-06-28 23:59</div>
            </div>
            <span class="left">7天</span>
          </div>
        </section>
      </aside>
      <div class="strip">今天 3 件 | 最近截止：Graph Mining Quiz（2天）</div>
    </main>
  </body>
</html>
